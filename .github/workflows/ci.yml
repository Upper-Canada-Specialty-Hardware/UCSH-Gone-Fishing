name: CI

# Runs the automated gate this repo previously lacked: back-end tests and the
# front-end build. Railway still deploys on merge to master with no test gate,
# so this is what catches a broken change BEFORE it can be merged.
on:
  push:
    branches: [master]
  pull_request:

# Cancel an in-progress run when new commits are pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # matches the backend Dockerfile pin
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest        # pytest is intentionally not in requirements.txt
      - name: Run tests
        run: pytest -q               # conftest stubs all secrets, so no .env is needed

  frontend-build:
    name: Frontend build (tsc + vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20" # matches the frontend Dockerfile (node:20-alpine)
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install          # mirrors the Dockerfile (npm install, not npm ci)
      - name: Build
        run: npm run build         # tsc -b && vite build — the repo's only static check
