# Ruff configuration — https://docs.astral.sh/ruff/
#
# Intentionally minimal for the first pass. We keep Ruff's DEFAULT rule set
# (pyflakes `F` + the essential pycodestyle error rules `E4`/`E7`/`E9`) and add
# nothing opinionated yet. That default catches genuinely broken code — undefined
# names, unused imports, duplicate keys — which is exactly what silently breaks a
# Railway build and burns deploy credits. Stylistic rule sets (isort `I`,
# pyupgrade `UP`, bugbear `B`, line-length `E501`) can be turned on later, once
# the codebase is clean enough that enabling them stays a small diff.
target-version = "py312"

# Autogenerated Alembic revisions accumulate unused imports on every
# --autogenerate; they are machine-written, so don't lint them. (.venv and the
# usual build dirs are excluded by Ruff's defaults.)
extend-exclude = ["alembic/versions"]

[lint.per-file-ignores]
# main.py registers its routers *after* the FastAPI app object (and its
# middleware / exception handlers) are created — a deliberate pattern that keeps
# router modules from importing a half-built app and hitting circular imports.
# Those late module-level imports are correct here, so E402 is not a defect.
"app/main.py" = ["E402"]
